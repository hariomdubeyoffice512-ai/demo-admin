<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Winkget Central Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --accent: #6366f1;
    --bg: #f0f4ff;
    --white: #ffffff;
    --sidebar-bg: #0f172a;
    --sidebar-text: #94a3b8;
    --sidebar-active: #2563eb;
    --card-bg: #ffffff;
    --text-dark: #0f172a;
    --text-mid: #475569;
    --text-light: #94a3b8;
    --border: #e2e8f0;
    --green: #22c55e;
    --orange: #f59e0b;
    --purple: #8b5cf6;
    --red: #ef4444;
    --teal: #14b8a6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-dark);
    min-height: 100vh;
  }

  /* ─── LOGIN PAGE ─── */
  #login-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0f172a 100%);
    position: relative;
    overflow: hidden;
  }

  #login-page::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(99,102,241,0.2) 0%, transparent 70%);
    top: -200px; right: -200px;
    border-radius: 50%;
  }

  #login-page::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(37,99,235,0.15) 0%, transparent 70%);
    bottom: -100px; left: -100px;
    border-radius: 50%;
  }

  .login-box {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 48px 44px;
    width: 420px;
    position: relative;
    z-index: 2;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    animation: fadeUp 0.6s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .login-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }

  .login-logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, #2563eb, #6366f1);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    color: white;
    font-size: 20px;
  }

  .login-logo-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: white;
  }

  .login-logo-text span { color: #60a5fa; }

  .login-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: white;
    margin-bottom: 8px;
  }

  .login-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 32px;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }

  .form-group input {
    width: 100%;
    padding: 13px 16px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    color: white;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border 0.2s, background 0.2s;
  }

  .form-group input::placeholder { color: rgba(255,255,255,0.3); }
  .form-group input:focus {
    border-color: #2563eb;
    background: rgba(37,99,235,0.1);
  }

  .login-hint {
    background: rgba(37,99,235,0.15);
    border: 1px solid rgba(37,99,235,0.3);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 20px;
    font-size: 12.5px;
    color: #93c5fd;
  }

  .login-hint strong { color: #60a5fa; }

  .btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #2563eb, #6366f1);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
    letter-spacing: 0.3px;
  }

  .btn-login:hover { opacity: 0.92; transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); }

  .login-error {
    color: #fca5a5;
    font-size: 13px;
    margin-top: 10px;
    display: none;
    text-align: center;
  }

  /* ─── MAIN DASHBOARD ─── */
  #dashboard-page { display: none; min-height: 100vh; flex-direction: column; }

  /* TOP HEADER */
  .top-header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 12px rgba(0,0,0,0.06);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 32px;
  }

  .header-logo {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none;
  }

  .header-logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #2563eb, #6366f1);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800; color: white; font-size: 16px;
  }

  .header-logo-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800; font-size: 18px;
    color: var(--text-dark);
  }

  .header-logo-text span { color: #2563eb; }

  /* PLATFORM TABS */
  .platform-tabs {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .platform-tab {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-mid);
    border: 1.5px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
  }

  .platform-tab:hover {
    background: var(--bg);
    color: var(--text-dark);
  }

  .platform-tab.active {
    background: #eff6ff;
    color: #2563eb;
    border-color: #bfdbfe;
  }

  .platform-tab .tab-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .header-right {
    display: flex; align-items: center; gap: 16px;
  }

  .notif-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--white);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; position: relative;
    color: var(--text-mid);
    font-size: 16px;
  }

  .notif-badge {
    position: absolute; top: -4px; right: -4px;
    width: 16px; height: 16px;
    background: #ef4444;
    border-radius: 50%;
    font-size: 9px;
    font-weight: 700;
    color: white;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid white;
  }

  .user-avatar {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #2563eb, #6366f1);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700; color: white; font-size: 13px;
    cursor: pointer;
  }

  .logout-btn {
    padding: 7px 14px;
    border: 1.5px solid var(--border);
    border-radius: 9px;
    background: white;
    color: var(--text-mid);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .logout-btn:hover { background: #fef2f2; border-color: #fca5a5; color: #ef4444; }

  /* CONTENT AREA */
  .dashboard-body {
    flex: 1;
    padding: 28px;
    animation: fadeIn 0.35s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* PLATFORM BANNER */
  .platform-banner {
    border-radius: 18px;
    padding: 28px 32px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: white;
    position: relative;
    overflow: hidden;
  }

  .platform-banner::after {
    content: '';
    position: absolute;
    right: -40px; top: -40px;
    width: 200px; height: 200px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }

  .banner-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 22px; font-weight: 700; }
  .banner-sub { font-size: 13.5px; opacity: 0.75; margin-top: 4px; }
  .banner-badge {
    background: rgba(255,255,255,0.2);
    padding: 6px 14px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
    backdrop-filter: blur(10px);
  }

  /* STATS GRID */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--white);
    border-radius: 14px;
    padding: 20px;
    border: 1px solid var(--border);
    transition: box-shadow 0.2s;
  }

  .stat-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

  .stat-card .stat-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    margin-bottom: 14px;
  }

  .stat-card .stat-value {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 28px; font-weight: 800;
    color: var(--text-dark);
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-card .stat-label {
    font-size: 12px; font-weight: 600;
    color: var(--text-light);
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  .stat-card .stat-badge {
    display: inline-block;
    padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
    margin-top: 8px;
  }

  /* CONTENT GRID */
  .content-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .panel {
    background: var(--white);
    border-radius: 14px;
    border: 1px solid var(--border);
    padding: 22px;
  }

  .panel-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px; font-weight: 700;
    color: var(--text-dark);
    margin-bottom: 18px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .panel-title a {
    font-size: 12px; font-weight: 600;
    color: var(--primary); text-decoration: none;
  }

  .progress-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px;
  }

  .progress-label { font-size: 13px; color: var(--text-mid); width: 120px; flex-shrink: 0; }
  .progress-bar-wrap { flex: 1; height: 6px; background: #f1f5f9; border-radius: 99px; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 99px; }
  .progress-pct { font-size: 12px; font-weight: 600; color: var(--text-mid); width: 36px; text-align: right; }

  .review-item { 
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 12px 0; border-bottom: 1px solid #f8fafc;
  }
  .review-item:last-child { border-bottom: none; }
  .review-name { font-size: 13.5px; font-weight: 600; margin-bottom: 3px; }
  .review-text { font-size: 12px; color: var(--text-light); }
  .review-stars { font-size: 13px; font-weight: 700; }

  /* HOME / OVERVIEW */
  .home-welcome {
    background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #6366f1 100%);
    border-radius: 20px;
    padding: 36px 40px;
    color: white;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }

  .home-welcome::before {
    content: '';
    position: absolute;
    right: -60px; top: -60px;
    width: 280px; height: 280px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }

  .home-welcome h2 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 28px; font-weight: 800; margin-bottom: 8px;
  }
  .home-welcome p { font-size: 14px; opacity: 0.75; max-width: 440px; }

  .platform-cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .platform-card {
    background: var(--white);
    border-radius: 16px;
    padding: 24px;
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: all 0.25s;
    display: flex; flex-direction: column; gap: 12px;
  }

  .platform-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    border-color: transparent;
  }

  .platform-card .card-icon {
    width: 48px; height: 48px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }

  .platform-card .card-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px; font-weight: 700; color: var(--text-dark);
  }

  .platform-card .card-desc {
    font-size: 12.5px; color: var(--text-light); line-height: 1.5;
  }

  .platform-card .card-launch {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 700;
    margin-top: auto;
  }

  /* FOOTER */
  .dash-footer {
    background: var(--white);
    border-top: 1px solid var(--border);
    padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; color: var(--text-light);
  }

  /* ─── PLATFORM DATA ─── */
</style>
</head>

      { icon: "📖", bg: "#faf5ff", label: "ENROLLED COURSES", value: "0", badge: "Active", badgeBg: "#ede9fe", badgeColor: "#7c3aed" },
      { icon: "✅", bg: "#f0fdf4", label: "COMPLETED", value: "0", badge: "Done", badgeBg: "#dcfce7", badgeColor: "#15803d" },
      { icon: "🏅", bg: "#fffbeb", label: "CERTIFICATES", value: "0", badge: "Earned", badgeBg: "#fef3c7", badgeColor: "#d97706" },
      { icon: "⏱️", bg: "#eff6ff", label: "HOURS LEARNED", value: "0", badge: "Total", badgeBg: "#dbeafe", badgeColor: "#1d4ed8" },
    ],
    panels: [
      { type: "empty", title: "Continue Learning", msg: "No courses yet!", sub: "You haven't enrolled in any courses." },
      { type: "empty", title: "Your Certificates", msg: "No certificates yet", sub: "Complete courses to earn certificates." },
    ]
  }
};

// ─── AUTH ────────────────────────────────────────
function doLogin() {
  const email = document.getElementById('login-email').value;
  const pass  = document.getElementById('login-pass').value;
  if (email === 'rahul@winkget.com' && pass === 'demo123') {
    document.getElementById('login-page').style.display = 'none';
    const dp = document.getElementById('dashboard-page');
    dp.style.display = 'flex';
    initDashboard();
  } else {
    const err = document.getElementById('login-error');
    err.style.display = 'block';
  }
}

function doLogout() {
  document.getElementById('dashboard-page').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
}

// Allow Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-page').style.display !== 'none') doLogin();
});

// ─── INIT ────────────────────────────────────────
let activePlatform = 'home';

function initDashboard() {
  document.getElementById('user-avatar').textContent = USER.initials;
  renderTabs();
  switchPlatform('home');
}

function renderTabs() {
  const container = document.getElementById('platform-tabs');
  let html = `<button class="platform-tab ${activePlatform === 'home' ? 'active' : ''}" onclick="switchPlatform('home')">🏠 Overview</button>`;
  USER.platforms.forEach(pid => {
    const p = PLATFORMS[pid];
    html += `
      <button class="platform-tab ${activePlatform === pid ? 'active' : ''}" onclick="switchPlatform('${pid}')">
        <span class="tab-dot" style="background:${p.dot}"></span>
        ${p.label}
      </button>`;
  });
  container.innerHTML = html;
}

// ─── SWITCH PLATFORM ─────────────────────────────
function switchPlatform(pid) {
  activePlatform = pid;
  renderTabs();
  const body = document.getElementById('dashboard-body');
  body.style.animation = 'none';
  body.offsetHeight; // reflow
  body.style.animation = 'fadeIn 0.35s ease';

  if (pid === 'home') {
    body.innerHTML = renderHome();
  } else {
    body.innerHTML = renderPlatformDashboard(pid);
  }
}

// ─── HOME ─────────────────────────────────────────
function renderHome() {
  const time = new Date().getHours();
  const greet = time < 12 ? 'Good morning' : time < 17 ? 'Good afternoon' : 'Good evening';
  const today = new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  let cards = '';
  USER.platforms.forEach(pid => {
    const p = PLATFORMS[pid];
    cards += `
      <div class="platform-card" onclick="switchPlatform('${pid}')" style="border-color:transparent;">
        <div class="card-icon" style="background:${p.color}18">${p.icon}</div>
        <div>
          <div class="card-name">Winkget ${p.label}</div>
          <div class="card-desc" style="margin-top:4px">${p.desc}</div>
        </div>
        <div class="card-launch" style="color:${p.color}">
          Open Dashboard <span>→</span>
        </div>
      </div>`;
  });

  return `
    <div class="home-welcome">
      <div>
        <h2>${greet}, ${USER.name.split(' ')[0]}! 👋</h2>
        <p>${today} · You have ${USER.platforms.length} active platforms on Winkget</p>
      </div>
    </div>
    <div style="margin-bottom:16px">
      <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;font-weight:700;color:#0f172a;margin-bottom:16px">
        Your Platforms
      </div>
      <div class="platform-cards-grid">${cards}</div>
    </div>
    <div class="panel" style="margin-bottom:0">
      <div class="panel-title">Quick Summary</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
        <div style="text-align:center;padding:16px;background:#f8fafc;border-radius:12px">
          <div style="font-size:24px;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif;color:#0f172a">10</div>
          <div style="font-size:12px;color:#94a3b8;font-weight:600;margin-top:4px">Total Orders</div>
        </div>
        <div style="text-align:center;padding:16px;background:#f8fafc;border-radius:12px">
          <div style="font-size:24px;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif;color:#0f172a">2</div>
          <div style="font-size:12px;color:#94a3b8;font-weight:600;margin-top:4px">Legal Plans</div>
        </div>
        <div style="text-align:center;padding:16px;background:#f8fafc;border-radius:12px">
          <div style="font-size:24px;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif;color:#0f172a">3</div>
          <div style="font-size:12px;color:#94a3b8;font-weight:600;margin-top:4px">Reviews</div>
        </div>
        <div style="text-align:center;padding:16px;background:#f8fafc;border-radius:12px">
          <div style="font-size:24px;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif;color:#0f172a">7</div>
          <div style="font-size:12px;color:#94a3b8;font-weight:600;margin-top:4px">Notifications</div>
        </div>
      </div>
    </div>`;
}

// ─── PLATFORM DASHBOARD ──────────────────────────
function renderPlatformDashboard(pid) {
  const p = PLATFORMS[pid];

  // Stats
  const statsHTML = p.stats.map(s => `
    <div class="stat-card">
      <div class="stat-icon" style="background:${s.bg}">${s.icon}</div>
      <div class="stat-value">${s.value}</div>
      <div class="stat-label">${s.label}</div>
      <span class="stat-badge" style="background:${s.badgeBg};color:${s.badgeColor}">${s.badge}</span>
    </div>`).join('');

  // Panels
  let panelsHTML = '';
  p.panels.forEach(panel => {
    if (panel.type === 'progress') {
      const rows = panel.rows.map(r => `
        <div class="progress-row">
          <div class="progress-label">${r.label}</div>
          <div class="progress-bar-wrap">
            <div class="progress-bar" style="width:${r.pct}%;background:${r.color}"></div>
          </div>
          <div class="progress-pct">${r.pct}%</div>
        </div>`).join('');
      panelsHTML += `<div class="panel"><div class="panel-title">${panel.title}</div>${rows}</div>`;
    }

    else if (panel.type === 'plans') {
      const items = panel.plans.map(pl => `
        <div class="review-item">
          <div>
            <div class="review-name">${pl.name}</div>
            <div class="review-text">${pl.sub}</div>
          </div>
          <span style="background:#dcfce7;color:#15803d;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600">● ${pl.status}</span>
        </div>`).join('');
      panelsHTML += `<div class="panel"><div class="panel-title">${panel.title} <a href="#">View All</a></div>${items}</div>`;
    }

    else if (panel.type === 'advisor') {
      const a = panel.advisor;
      panelsHTML += `
        <div class="panel">
          <div class="panel-title">${panel.title}</div>
          <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
            <div style="width:48px;height:48px;background:linear-gradient(135deg,#f59e0b,#ef4444);border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:800;color:white;font-size:18px">${a.name[0].toUpperCase()}</div>
            <div>
              <div style="font-weight:700;font-size:15px">${a.name}</div>
              <div style="font-size:12px;color:#22c55e;font-weight:600">● ${a.status}</div>
            </div>
          </div>
          <div style="font-size:13px;color:#475569;margin-bottom:6px">📱 ${a.mobile}</div>
          <div style="font-size:13px;color:#475569;margin-bottom:16px">✉️ ${a.email}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <button style="padding:10px;background:#2563eb;color:white;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:13px">💬 Chat</button>
            <button style="padding:10px;background:#22c55e;color:white;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:13px">📱 WhatsApp</button>
          </div>
        </div>`;
    }

    else if (panel.type === 'empty') {
      panelsHTML += `
        <div class="panel">
          <div class="panel-title">${panel.title}</div>
          <div style="text-align:center;padding:32px 0;color:#94a3b8">
            <div style="font-size:36px;margin-bottom:12px">📭</div>
            <div style="font-weight:600;color:#475569;margin-bottom:4px">${panel.msg}</div>
            <div style="font-size:12px">${panel.sub}</div>
          </div>
        </div>`;
    }
  });

  // Reviews section (only for business)
  let reviewsHTML = '';
  if (p.reviews) {
    const items = p.reviews.map(r => `
      <div class="review-item">
        <div>
          <div class="review-name">${r.name}</div>
          <div class="review-text">${r.text} · ${r.date}</div>
        </div>
        <div class="review-stars" style="color:${r.color}">${r.stars}</div>
      </div>`).join('');
    reviewsHTML = `
      <div class="panel" style="margin-top:16px">
        <div class="panel-title">Latest Reviews</div>
        ${items}
      </div>`;
  }

  return `
    <div class="platform-banner" style="background:${p.gradient}">
      <div>
        <div class="banner-title">${p.icon} Winkget ${p.label}</div>
        <div class="banner-sub">${p.desc}</div>
      </div>
      <div class="banner-badge">Active Platform</div>
    </div>
    <div class="stats-grid">${statsHTML}</div>
    <div class="content-grid">${panelsHTML}</div>
    ${reviewsHTML}`;
}
</script>
</body>
</html>
